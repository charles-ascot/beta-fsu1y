steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - beta-fsu1y
      - --source=./backend
      - --region=europe-west2
      - --project=chimera-v4
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080
      - --clear-base-image
      - --set-secrets=RACING_API_USER=fsu1y-racing-api-user:latest,RACING_API_PASS=fsu1y-racing-api-pass:latest,ADMIN_KEY=fsu1y-admin-key:latest
      - '--set-env-vars=GCP_PROJECT=chimera-v4,ALLOWED_ORIGINS=["https://fsu-1y.pages.dev","https://fsu1y.thync.online"]'

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY
